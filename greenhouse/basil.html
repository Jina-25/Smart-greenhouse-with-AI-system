<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Basil</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #f8f5f7, #f3e8ec);
        }

        /* Header */
        header {
            background: linear-gradient(90deg, #800020, #a8324a);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        /* Main Layout */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            padding: 60px;
            flex-wrap: wrap;
        }

        /* Image */
        .image-box img {
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .image-box img:hover {
            transform: scale(1.05);
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: left;
        }

        /* Title */
        h1 {
            text-align: center;
            color: #800020;
            margin-top: 30px;
        }

        /* Card content */
        .card h3 {
            color: #800020;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 18px;
            margin: 10px 0;
        }

        /* Button */
        .btn {
            display: block;
            margin: 40px auto;
            background: linear-gradient(45deg, #800020, #a8324a);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #5a0015;
        }

        /* Gauge Styles */
        .gauge-container {
            margin-bottom: 25px;
        }

        .gauge-label {
            font-weight: bold;
            color: #333;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .gauge-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            position: relative;
            margin: 10px 0;
        }

        .marker-current {
            width: 14px;
            height: 14px;
            background: #ff0000;
            border-radius: 50%;
            position: absolute;
            top: -2px;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
            transition: left 0.5s ease-in-out;
            z-index: 2;
        }

        .marker-setpoint {
            width: 4px;
            height: 18px;
            background: #007bff;
            position: absolute;
            top: -4px;
            z-index: 1;
        }

        .gauge-values {
            font-size: 14px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <header>
        Smart Greenhouse System
    </header>

    <h1>Basil 🌿</h1>

    <div class="container">

        <!-- Image -->
        <div class="image-box">
            <img src="Images/Basil 2.jpg">
        </div>

        <!-- Data Card -->
        <div class="card" style="width: 450px;">
            <h3>Environmental Status</h3>
            <div id="data">
                <!-- Temperature -->
                <div class="gauge-container">
                    <div class="gauge-label"><span>Temperature</span> <span id="temp-num">--</span>°C</div>
                    <div class="gauge-bar">
                        <div id="temp-setpoint" class="marker-setpoint"></div>
                        <div id="temp-current" class="marker-current"></div>
                    </div>
                    <div class="gauge-values"><span>10°C</span> <span id="temp-target-text">Setpoint: --</span>
                        <span>50°C</span>
                    </div>
                </div>
                <!-- Humidity -->
                <div class="gauge-container">
                    <div class="gauge-label"><span>Humidity</span> <span id="hum-num">--</span>%</div>
                    <div class="gauge-bar">
                        <div id="hum-setpoint" class="marker-setpoint"></div>
                        <div id="hum-current" class="marker-current"></div>
                    </div>
                    <div class="gauge-values"><span>0%</span> <span id="hum-target-text">Setpoint: --</span>
                        <span>100%</span>
                    </div>
                </div>
                <!-- Soil Moisture -->
                <div class="gauge-container">
                    <div class="gauge-label"><span>Soil Moisture</span> <span id="soil-num">--</span>%</div>
                    <div class="gauge-bar">
                        <div id="soil-setpoint" class="marker-setpoint"></div>
                        <div id="soil-current" class="marker-current"></div>
                    </div>
                    <div class="gauge-values"><span>0%</span> <span id="soil-target-text">Setpoint: --</span>
                        <span>100%</span>
                    </div>
                </div>
                <!-- Light -->
                <div class="gauge-container">
                    <div class="gauge-label"><span>Light Intensity</span> <span id="light-num">--</span> lux</div>
                    <div class="gauge-bar">
                        <div id="light-setpoint" class="marker-setpoint"></div>
                        <div id="light-current" class="marker-current"></div>
                    </div>
                    <div class="gauge-values"><span>1000</span> <span id="light-target-text">Setpoint: --</span>
                        <span>16000</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <button class="btn" onclick="goBack()">Back</button>

    <script>
        let setpoints = { temp: 0, hum: 0, soil: 0, light: 0 };

        function goBack() {
            window.location.href = "index.html";
        }

        // 1. Load Optimal Data (Setpoints)
        fetch("getPlant.php?plant=Basil")
            .then(res => res.json())
            .then(data => {
                setpoints = {
                    temp: data.temperature,
                    hum: data.humidity,
                    soil: data.soil_moisture,
                    light: data.light
                };

                // Position Blue Markers
                document.getElementById("temp-setpoint").style.left = ((setpoints.temp - 10) / 40 * 100) + "%";
                document.getElementById("hum-setpoint").style.left = setpoints.hum + "%";
                document.getElementById("soil-setpoint").style.left = setpoints.soil + "%";
                document.getElementById("light-setpoint").style.left = ((setpoints.light - 1000) / 15000 * 100) + "%";

                document.getElementById("temp-target-text").innerText = "Setpoint: " + setpoints.temp + "°C";
                document.getElementById("hum-target-text").innerText = "Setpoint: " + setpoints.hum + "%";
                document.getElementById("soil-target-text").innerText = "Setpoint: " + setpoints.soil + "%";
                document.getElementById("light-target-text").innerText = "Setpoint: " + setpoints.light + " lux";
            });

        // 2. Update Current Values (Red Dots)
        function updateGauges() {
            fetch("getCurrentPlant.php")
                .then(res => res.json())
                .then(data => {
                    // Update Numbers
                    document.getElementById("temp-num").innerText = data.temperature;
                    document.getElementById("hum-num").innerText = data.humidity;
                    document.getElementById("soil-num").innerText = data.soil_moisture;
                    document.getElementById("light-num").innerText = data.light;

                    // Move Red Dots (10-50 range for temp, 1000-16000 for light)
                    document.getElementById("temp-current").style.left = ((data.temperature - 10) / 40 * 100) + "%";
                    document.getElementById("hum-current").style.left = data.humidity + "%";
                    document.getElementById("soil-current").style.left = data.soil_moisture + "%";
                    document.getElementById("light-current").style.left = ((data.light - 1000) / 15000 * 100) + "%";
                });
        }

        setInterval(updateGauges, 3000);
        updateGauges();

    </script>

</body>

</html>
